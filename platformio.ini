[platformio]
build_dir = C:/Users/shenf/.pio/build/cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = no_ota.csv

; Enable PSRAM. CoreS3 boards commonly need QSPI PSRAM mode under PlatformIO.
board_build.arduino.memory_type = qio_qspi

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -O2
    -std=c++17

; CoreS3 requires USB CDC for serial
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    m5stack/M5CoreS3
    m5stack/M5Unified
    m5stack/M5GFX
    bblanchon/ArduinoJson @ ^7
    links2004/WebSockets @ ^2.4
    sh123/esp32_opus
